<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Brass Bulldog Bento Bar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            Brass Bulldog Bento Bar
        </a>

        <div class="ms-auto">
            <a href="menu.html" class="btn btn-outline-primary">
                ← Back to Menu
            </a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <h1>Your Cart</h1>

    <div id="cartContainer"></div>

    <hr>

    <div id="cartSummary" class="mt-3"></div>

    <!-- MODAL TRIGGERS -->
    <div class="mt-3">
        <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#cancelModal">
            Cancel Order
        </button>

        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#submitModal">
            Submit Order
        </button>
    </div>

</div>

<!-- CANCEL MODAL -->
<div class="modal fade" id="cancelModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Cancel Order</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Are you sure you want to cancel your order? Your cart will be cleared.
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
            Keep Order
        </button>

        <button class="btn btn-danger" onclick="confirmCancel()">
            Yes, Cancel
        </button>
      </div>

    </div>
  </div>
</div>

<!-- SUBMIT MODAL -->
<div class="modal fade" id="submitModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Submit Order</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Confirm your order? This will finalize your purchase and clear your cart.
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
            Go Back
        </button>

        <button class="btn btn-success" onclick="confirmSubmit()">
            Place Order
        </button>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPTS (IMPORTANT ORDER) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
